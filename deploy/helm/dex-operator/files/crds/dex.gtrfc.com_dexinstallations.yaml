---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: dexinstallations.dex.gtrfc.com
spec:
  group: dex.gtrfc.com
  names:
    kind: DexInstallation
    listKind: DexInstallationList
    plural: dexinstallations
    shortNames:
    - dexinst
    singular: dexinstallation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.issuer
      name: Issuer
      type: string
    - jsonPath: .spec.storage.type
      name: Storage
      type: string
    - jsonPath: .status.connectorCount
      name: Connectors
      type: integer
    - jsonPath: .status.staticClientCount
      name: Clients
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          DexInstallation is the Schema for the dexinstallations API.
          It describes a complete Dex OIDC provider installation including issuer,
          storage, web, gRPC, logger, and expiry configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DexInstallationSpec defines the desired state of DexInstallation.
            properties:
              allowedNamespaces:
                description: |-
                  AllowedNamespaces is a list of namespaces from which Connectors and
                  StaticClients can reference this installation.
                  Use ["*"] to allow all namespaces.
                items:
                  type: string
                type: array
              configSecretName:
                description: |-
                  ConfigSecretName is the name of the Secret written to the Dex namespace
                  that holds the rendered Dex config.yaml.
                type: string
              cors:
                description: CORS configures Cross-Origin Resource Sharing.
                properties:
                  allowedHeaders:
                    description: AllowedHeaders lists additional headers to allow
                      in CORS requests.
                    items:
                      type: string
                    type: array
                  allowedOrigins:
                    description: AllowedOrigins lists origins that may send cross-origin
                      requests.
                    items:
                      type: string
                    type: array
                type: object
              envSecretName:
                description: |-
                  EnvSecretName is the name of the Secret written to the Dex namespace
                  that holds all client secrets as env variables.
                type: string
              expiry:
                description: Expiry configures token expiration.
                properties:
                  authRequests:
                    description: AuthRequests is the lifetime of pending auth requests.
                    type: string
                  deviceRequests:
                    description: DeviceRequests is the lifetime of pending device
                      requests.
                    type: string
                  idTokens:
                    description: IDTokens is the lifetime of issued ID tokens.
                    type: string
                  refreshTokens:
                    description: RefreshTokens configures refresh token expiry.
                    properties:
                      absoluteLifetime:
                        description: AbsoluteLifetime is the absolute maximum lifetime
                          of a refresh token.
                        type: string
                      disableRotation:
                        description: DisableRotation disables refresh token rotation.
                        type: boolean
                      reuseInterval:
                        description: ReuseInterval is the minimum time before a new
                          refresh token is issued.
                        type: string
                      validIfNotUsedFor:
                        description: ValidIfNotUsedFor invalidates the token if not
                          used for this duration.
                        type: string
                    type: object
                  signingKeys:
                    description: SigningKeys is the period after which Dex rotates
                      signing keys.
                    type: string
                type: object
              frontend:
                description: Frontend configures the Dex web frontend appearance.
                properties:
                  dir:
                    description: Dir is the path to the web assets directory.
                    type: string
                  issuer:
                    description: Issuer overrides the issuer string displayed in the
                      Dex UI.
                    type: string
                  logoURL:
                    description: LogoURL is the URL of a logo to display in the Dex
                      UI.
                    type: string
                  theme:
                    description: Theme selects the Dex UI theme (e.g. "dark", "light",
                      "coreos", "tectonic").
                    type: string
                type: object
              grpc:
                description: GRPC configures the optional gRPC API server.
                properties:
                  addr:
                    description: Addr is the gRPC address (e.g. 0.0.0.0:5557).
                    type: string
                  reflection:
                    description: Reflection enables gRPC server reflection.
                    type: boolean
                  tlsCert:
                    description: TLSCert is the path to the TLS certificate file.
                    type: string
                  tlsClientCA:
                    description: TLSClientCA is the path to the client CA certificate
                      file.
                    type: string
                  tlsKey:
                    description: TLSKey is the path to the TLS key file.
                    type: string
                type: object
              issuer:
                description: Issuer is the base URL for the OpenID Connect issuer.
                format: uri
                type: string
              logger:
                description: Logger configures Dex logging.
                properties:
                  format:
                    description: Format sets the log format (json, text).
                    enum:
                    - json
                    - text
                    type: string
                  level:
                    description: Level sets the log level (debug, info, warning, error).
                    enum:
                    - debug
                    - info
                    - warning
                    - error
                    type: string
                type: object
              oauth2:
                description: OAuth2 configures the OAuth2 behaviour of Dex.
                properties:
                  alwaysShowLoginScreen:
                    description: AlwaysShowLoginScreen always shows the login screen
                      even for single connectors.
                    type: boolean
                  grantTypes:
                    description: GrantTypes lists allowed OAuth2 grant types.
                    items:
                      type: string
                    type: array
                  passwordConnector:
                    description: |-
                      PasswordConnector sets the connector used for the Resource Owner Password
                      Credentials grant type.
                    type: string
                  responseTypes:
                    description: ResponseTypes restricts which response_type values
                      are supported.
                    items:
                      type: string
                    type: array
                  skipApprovalScreen:
                    description: SkipApprovalScreen skips the UI approval screen on
                      every auth request.
                    type: boolean
                type: object
              rolloutRestart:
                description: |-
                  RolloutRestart configures an optional automated rollout restart of the
                  Dex Deployment when the config changes.
                properties:
                  deploymentName:
                    description: DeploymentName is the name of the Dex Deployment
                      to restart.
                    type: string
                  enabled:
                    description: Enabled toggles the automatic rollout restart.
                    type: boolean
                type: object
              storage:
                description: Storage configures the Dex storage backend.
                properties:
                  etcd:
                    description: Etcd configures an etcd storage backend.
                    properties:
                      endpoints:
                        description: Endpoints is a list of etcd endpoints.
                        items:
                          type: string
                        minItems: 1
                        type: array
                      namespace:
                        description: Namespace is the etcd key prefix.
                        type: string
                      passwordRef:
                        description: PasswordRef references the etcd password secret
                          key.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret resource.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      ssl:
                        description: SSL configures etcd TLS.
                        properties:
                          caRef:
                            description: CARef references the CA certificate secret
                              key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          certRef:
                            description: CertRef references the client certificate
                              secret key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          keyRef:
                            description: KeyRef references the client key secret key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          serverName:
                            description: ServerName overrides the TLS server name.
                            type: string
                        type: object
                      username:
                        description: Username is the etcd basic auth username.
                        type: string
                    required:
                    - endpoints
                    type: object
                  mysql:
                    description: MySQL configures a MySQL storage backend.
                    properties:
                      connMaxLifetime:
                        description: ConnMaxLifetime in seconds.
                        type: integer
                      dsn:
                        description: DSN is the MySQL data source name.
                        type: string
                      dsnRef:
                        description: DSNRef references the Secret key holding the
                          MySQL DSN.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret resource.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      maxIdleConns:
                        description: MaxIdleConns limits the number of idle connections.
                        type: integer
                      maxOpenConns:
                        description: MaxOpenConns limits the number of open connections.
                        type: integer
                    type: object
                  postgres:
                    description: Postgres configures a PostgreSQL storage backend.
                    properties:
                      connMaxLifetime:
                        description: ConnMaxLifetime in seconds.
                        type: integer
                      connectionTimeout:
                        description: ConnectionTimeout in seconds.
                        type: integer
                      database:
                        description: Database is the PostgreSQL database name.
                        type: string
                      host:
                        description: Host is the PostgreSQL host (host:port).
                        type: string
                      maxIdleConns:
                        description: MaxIdleConns limits the number of idle connections.
                        type: integer
                      maxOpenConns:
                        description: MaxOpenConns limits the number of open connections.
                        type: integer
                      passwordRef:
                        description: PasswordRef references the Secret key holding
                          the PostgreSQL password.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret resource.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      ssl:
                        description: SSL configures PostgreSQL TLS.
                        properties:
                          caRef:
                            description: CARef references the CA certificate secret
                              key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          certRef:
                            description: CertRef references the client certificate
                              secret key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          keyRef:
                            description: KeyRef references the client key secret key.
                            properties:
                              key:
                                description: Key within the Secret.
                                type: string
                              name:
                                description: Name of the Secret resource.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          mode:
                            description: Mode is the SSL mode (disable, require, verify-ca,
                              verify-full).
                            enum:
                            - disable
                            - require
                            - verify-ca
                            - verify-full
                            type: string
                        type: object
                      user:
                        description: User is the PostgreSQL user.
                        type: string
                    required:
                    - database
                    - host
                    - user
                    type: object
                  sqlite3:
                    description: SQLite3 configures a SQLite3 file storage backend.
                    properties:
                      file:
                        description: File is the path to the SQLite3 database file.
                        type: string
                    required:
                    - file
                    type: object
                  type:
                    description: Type selects the storage backend.
                    enum:
                    - kubernetes
                    - memory
                    - postgres
                    - sqlite3
                    - etcd
                    - mysql
                    type: string
                required:
                - type
                type: object
              web:
                description: Web configures the HTTP/HTTPS endpoints of Dex.
                properties:
                  allowedOrigins:
                    description: AllowedOrigins lists origins from which cross-origin
                      requests are allowed.
                    items:
                      type: string
                    type: array
                  http:
                    description: HTTP is the address for the HTTP endpoint (e.g. 0.0.0.0:5556).
                    type: string
                  https:
                    description: HTTPS is the address for the HTTPS endpoint (e.g.
                      0.0.0.0:5554).
                    type: string
                  tlsCert:
                    description: TLSCert is the path to the TLS certificate file.
                    type: string
                  tlsKey:
                    description: TLSKey is the path to the TLS key file.
                    type: string
                type: object
            required:
            - configSecretName
            - envSecretName
            - issuer
            - storage
            type: object
          status:
            description: DexInstallationStatus defines the observed state of DexInstallation.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the object's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connectorCount:
                description: ConnectorCount is the number of connectors currently
                  reconciled.
                type: integer
              observedGeneration:
                description: ObservedGeneration is the generation last processed by
                  the controller.
                format: int64
                type: integer
              staticClientCount:
                description: StaticClientCount is the number of static clients currently
                  reconciled.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
