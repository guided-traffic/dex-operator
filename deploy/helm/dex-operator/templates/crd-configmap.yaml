{{/*
ConfigMap embedding all CRD manifests.
Used by the pre-install / pre-upgrade hook Job to apply up-to-date CRDs.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dex-operator.fullname" . }}-crds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dex-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- range $path, $bytes := .Files.Glob "files/crds/*.yaml" }}
  {{ base $path }}: |
    {{- $bytes | toString | nindent 4 }}
  {{- end }}
