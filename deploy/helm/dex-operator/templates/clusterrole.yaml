apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dex-operator.fullname" . }}-role
  labels:
    {{- include "dex-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, patch, watch]
  - apiGroups: [dex.gtrfc.com]
    resources:
      - dexatlassiancrowdconnectors
      - dexauthproxyconnectors
      - dexbitbucketconnectors
      - dexgiteaconnectors
      - dexgithubconnectors
      - dexgitlabconnectors
      - dexgoogleconnectors
      - dexkeystoneconnectors
      - dexldapconnectors
      - dexlinkedinconnectors
      - dexlocalconnectors
      - dexmicrosoftconnectors
      - dexoauth2connectors
      - dexoidcconnectors
      - dexopenshiftconnectors
      - dexsamlconnectors
      - dexstaticclients
    verbs: [get, list, patch, update, watch]
  - apiGroups: [dex.gtrfc.com]
    resources:
      - dexatlassiancrowdconnectors/status
      - dexauthproxyconnectors/status
      - dexbitbucketconnectors/status
      - dexgiteaconnectors/status
      - dexgithubconnectors/status
      - dexgitlabconnectors/status
      - dexgoogleconnectors/status
      - dexinstallations/status
      - dexkeystoneconnectors/status
      - dexldapconnectors/status
      - dexlinkedinconnectors/status
      - dexlocalconnectors/status
      - dexmicrosoftconnectors/status
      - dexoauth2connectors/status
      - dexoidcconnectors/status
      - dexopenshiftconnectors/status
      - dexsamlconnectors/status
      - dexstaticclients/status
    verbs: [get, patch, update]
  - apiGroups: [dex.gtrfc.com]
    resources: [dexinstallations]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [dex.gtrfc.com]
    resources: [dexinstallations/finalizers]
    verbs: [update]
