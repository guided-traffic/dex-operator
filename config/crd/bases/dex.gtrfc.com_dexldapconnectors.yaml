                  scope:
                    description: Scope is the LDAP search scope (sub or one). Defaults
                      to sub.
                    enum:
                    - sub
                    - one
                    type: string
                  username:
                    description: Username is the attribute mapping to the user-provided
                      username field.
                    type: string
                required:
                - baseDN
                - username
                type: object
              usernamePrompt:
                description: UsernamePrompt overrides the username input label on
                  the login form.
                type: string
