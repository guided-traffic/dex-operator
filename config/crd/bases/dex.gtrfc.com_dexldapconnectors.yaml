                - key
                - name
                type: object
              startTLS:
                description: StartTLS upgrades the connection using the STARTTLS command.
                type: boolean
              userSearch:
                description: UserSearch configures user search parameters.
                properties:
                  baseDN:
                    description: BaseDN is the base distinguished name to search from.
                    type: string
                  emailAttr:
                    default: mail
                    description: EmailAttr is the LDAP attribute mapped to the email
