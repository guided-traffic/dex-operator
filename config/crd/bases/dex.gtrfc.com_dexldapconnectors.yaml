            properties:
              bindDN:
                description: BindDN is the DN used to bind to the LDAP directory.
                type: string
              bindPWRef:
                description: BindPWRef references the Secret key holding the bind
                  password.
                properties:
                  key:
                    description: Key within the Secret.
                    type: string
                  name:
                    description: Name of the Secret resource.
