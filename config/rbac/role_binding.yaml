    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: dex-operator
  name: dex-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dex-operator-role
subjects:
  - kind: ServiceAccount
    name: dex-operator-controller-manager
    namespace: dex-operator-system
